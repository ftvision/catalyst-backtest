[project]
name = "catalyst-market-data"
version = "0.1.0"
description = "Market data package for Catalyst backtesting"
requires-python = ">=3.12"
dependencies = [
  "catalyst-contracts",
  "catalyst-graph-compiler",
]

[tool.uv.sources]
catalyst-contracts = { workspace = true }
catalyst-graph-compiler = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/catalyst_market_data"]

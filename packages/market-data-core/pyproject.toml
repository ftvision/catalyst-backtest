[project]
name = "catalyst-market-data-core"
version = "0.1.0"
description = "Shared market-data store + ingestion plumbing for Catalyst vendor packages"
requires-python = ">=3.12"
dependencies = [
  "catalyst-contracts",
  "pyarrow>=15.0",
]

[tool.uv.sources]
catalyst-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/catalyst_market_data_core"]

[project]
name = "catalyst-contracts"
version = "0.1.0"
description = "Shared Python contract models for Catalyst backtesting"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/catalyst_contracts"]

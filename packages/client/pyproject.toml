[project]
name = "catalyst-client"
version = "0.1.0"
description = "Python CLI client for the Catalyst backtest service"
requires-python = ">=3.12"
dependencies = [
  "catalyst-contracts",
  "httpx>=0.27",
  "typer>=0.12",
  "rich>=13.0",
]

[project.scripts]
catalyst-bt = "catalyst_client.cli:main"

[tool.uv.sources]
catalyst-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/catalyst_client"]

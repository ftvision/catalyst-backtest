# Funding carry / basis - long spot + short perp when ETH perp funding is rich (g19).
# Verified against the deployed service.
#
#   catalyst-bt preview packages/client/examples/funding-carry.toml
#   catalyst-bt run     packages/client/examples/funding-carry.toml

graph = "../../../strategies/graphs/g19_funding_carry.json"
policy = "strict_v1"

[config]
start = "2026-01-01T00:00:00Z"
end = "2026-06-01T00:00:00Z"
interval = "1h"

[config.initial_portfolio.hyperliquid]
USDC = "10000"

# HL funding sits at its cap (~1.25e-5) ~80% of the time, so the carry is
# "almost always on". Open the basis once and hold it (collecting funding)
# instead of re-opening on every funding jitter.
[config.execution]
signal_trigger = "once_per_backtest"

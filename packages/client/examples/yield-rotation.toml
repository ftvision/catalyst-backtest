# Yield rotation - deposit when APR is high, withdraw when low (g25).
# Verified against the deployed service.
#
#   catalyst-bt preview packages/client/examples/yield-rotation.toml
#   catalyst-bt run     packages/client/examples/yield-rotation.toml

graph = "../../../strategies/graphs/g25_yield_rotation.json"
policy = "strict_v1"

[config]
start = "2026-01-01T00:00:00Z"
end = "2026-06-01T00:00:00Z"
interval = "1h"

[config.initial_portfolio.base]
USDC = "10000"

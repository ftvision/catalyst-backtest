[project]
name = "catalyst-market-data-dune"
version = "0.1.0"
description = "Dune Analytics ingester for the Catalyst market-data store"
requires-python = ">=3.12"
dependencies = [
  "catalyst-contracts",
  "catalyst-market-data-core",
  "httpx>=0.27",
]

[project.scripts]
catalyst-ingest-dune = "catalyst_market_data_dune.cli:main"

[tool.uv.sources]
catalyst-contracts = { workspace = true }
catalyst-market-data-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/catalyst_market_data_dune"]

app = "catalyst-backtest-api"
primary_region = "sjc"

[build]
  dockerfile = "infra/Dockerfile.api"

[env]
  CATALYST_SIM_BIND = "0.0.0.0:8080"
  CATALYST_STRATEGY_ROOT = "/app/strategies"
  CATALYST_SIM_WORKERS = "2"
  CATALYST_SIM_QUEUE = "128"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
